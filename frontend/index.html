<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>XAUUSD H1 — TD vs HD (Apr 8-10 2026)</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; background:#0e0e10; color:#ddd; font:14px/1.4 -apple-system,sans-serif; }
  header { padding:12px 16px; border-bottom:1px solid #222; display:flex; gap:24px; align-items:center; }
  header h1 { margin:0; font-size:16px; font-weight:600; }
  .legend { display:flex; gap:16px; font-size:12px; }
  .swatch { display:inline-block; width:10px; height:10px; margin-right:6px; vertical-align:middle; border-radius:2px; }
  .panes { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:#222; height:calc(100vh - 50px); }
  .pane { background:#0e0e10; display:flex; flex-direction:column; min-width:0; }
  .pane-title { padding:6px 12px; font-size:12px; color:#888; border-bottom:1px solid #1a1a1a; }
  .chart { flex:1; min-height:0; }
  @media (max-width:900px){ .panes{grid-template-columns:1fr; grid-template-rows:1fr 1fr;} }
</style>
</head>
<body>
<header>
  <h1>XAUUSD H1 — Apr 8-10, 2026 (UTC)</h1>
  <div class="legend">
    <span><span class="swatch" style="background:#26a69a"></span>up</span>
    <span><span class="swatch" style="background:#ef5350"></span>down</span>
    <span id="stats" style="color:#888"></span>
  </div>
</header>
<div class="panes">
  <div class="pane"><div class="pane-title">Twelve Data (TD)</div><div id="td" class="chart"></div></div>
  <div class="pane"><div class="pane-title">HistData (HD)</div><div id="hd" class="chart"></div></div>
</div>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script>
(async () => {
  const data = await fetch('data.json').then(r => r.json());
  document.getElementById('stats').textContent = `TD: ${data.td.length} bars | HD: ${data.hd.length} bars`;

  const common = {
    layout: { background:{type:'solid', color:'#0e0e10'}, textColor:'#ccc' },
    grid:   { vertLines:{color:'#1a1a1a'}, horzLines:{color:'#1a1a1a'} },
    timeScale: { timeVisible:true, secondsVisible:false, borderColor:'#333' },
    rightPriceScale: { borderColor:'#333' },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  };

  const tdChart = LightweightCharts.createChart(document.getElementById('td'), common);
  const hdChart = LightweightCharts.createChart(document.getElementById('hd'), common);
  const tdSeries = tdChart.addCandlestickSeries({ upColor:'#26a69a', downColor:'#ef5350', borderVisible:false, wickUpColor:'#26a69a', wickDownColor:'#ef5350' });
  const hdSeries = hdChart.addCandlestickSeries({ upColor:'#26a69a', downColor:'#ef5350', borderVisible:false, wickUpColor:'#26a69a', wickDownColor:'#ef5350' });
  tdSeries.setData(data.td);
  hdSeries.setData(data.hd);

  // Sync time axis + crosshair
  function syncTime(src, dst) {
    src.timeScale().subscribeVisibleLogicalRangeChange(r => {
      if (r) dst.timeScale().setVisibleLogicalRange(r);
    });
  }
  syncTime(tdChart, hdChart);
  syncTime(hdChart, tdChart);

  function syncCross(src, dst, srcSeries, dstSeries) {
    src.subscribeCrosshairMove(p => {
      if (!p || !p.time) { dst.clearCrosshairPosition(); return; }
      dst.setCrosshairPosition(NaN, p.time, dstSeries);
    });
  }
  syncCross(tdChart, hdChart, tdSeries, hdSeries);
  syncCross(hdChart, tdChart, hdSeries, tdSeries);

  window.addEventListener('resize', () => { tdChart.applyOptions({}); hdChart.applyOptions({}); });
})();
</script>
</body>
</html>
